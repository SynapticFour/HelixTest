version: "3.9"

services:
  mock-wes:
    image: ghcr.io/example/mock-wes:latest
    environment:
      - WES_PORT=8080
      - TRS_URL=http://mock-trs:8080
      - DRS_URL=http://mock-drs:8080
    ports:
      - "8081:8080"
    volumes:
      - ../test-data:/test-data:rw

  mock-tes:
    image: ghcr.io/example/mock-tes:latest
    environment:
      - TES_PORT=8080
    ports:
      - "8082:8080"

  mock-drs:
    image: ghcr.io/example/mock-drs:latest
    environment:
      - DRS_PORT=8080
    ports:
      - "8083:8080"
    volumes:
      - ../test-data:/test-data:rw

  mock-trs:
    image: ghcr.io/example/mock-trs:latest
    environment:
      - TRS_PORT=8080
    ports:
      - "8084:8080"
    volumes:
      - ../test-data:/test-data:ro

  mock-beacon:
    image: ghcr.io/example/mock-beacon:latest
    environment:
      - BEACON_PORT=8080
    ports:
      - "8085:8080"

  mock-auth:
    image: ghcr.io/example/mock-oidc:latest
    environment:
      - OIDC_PORT=8080
    ports:
      - "8086:8080"

