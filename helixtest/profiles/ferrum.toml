# Ferrum single-gateway layout (see Ferrum docs/HELIXTEST-INTEGRATION.md).
# All GA4GH APIs share one origin; paths match the gateway router.
[services]
wes = "http://localhost:8080/ga4gh/wes/v1"
tes = "http://localhost:8080/ga4gh/tes/v1"
drs = "http://localhost:8080/ga4gh/drs/v1"
trs = "http://localhost:8080/ga4gh/trs/v2"
beacon = "http://localhost:8080/ga4gh/beacon/v2"
auth = "http://localhost:8080/passports/v1"
# Optional override; otherwise derived as {gateway}/ga4gh/htsget/v1 from WES/DRS URLs above
# htsget = "http://localhost:8080/ga4gh/htsget/v1"

[features]
supports_scatter_gather = true
supports_beacon_v2 = true
strict_drs_checksums = true
